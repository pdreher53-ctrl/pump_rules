<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pump Rules · Season 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --hot-pink: #E91E63;
    --pink-deep: #B0124D;
    --gold: #FFD700;
    --gold-deep: #A8820E;
    --plum: #4A0E2E;
    --plum-deep: #2A0519;
    --black: #0A0A0A;
    --cream: #FFF9F0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050308; color: var(--cream); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100%; }
  body { height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(233, 30, 99, 0.12) 0%, transparent 65%), #050308; }

  /* TOP BAR */
  .topbar {
    flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top));
    background: rgba(10, 5, 10, 0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 215, 0, 0.15);
    position: relative; z-index: 20;
  }
  .logo { display: flex; align-items: baseline; gap: 6px; flex: 1; min-width: 0; }
  .logo-main { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 18px; color: var(--hot-pink); letter-spacing: -0.3px; text-shadow: 0 0 10px rgba(233, 30, 99, 0.45); line-height: 1; }
  .logo-sub { font-family: 'Inter', system-ui; font-size: 8px; font-weight: 900; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ep-counter { font-family: 'Inter', system-ui; font-size: 9px; font-weight: 900; letter-spacing: 0.22em; color: rgba(255, 249, 240, 0.55); padding: 5px 9px; border: 1px solid rgba(255, 249, 240, 0.15); border-radius: 999px; white-space: nowrap; }
  .menu-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .menu-btn:active { background: rgba(255, 215, 0, 0.25); }
  .menu-btn svg { width: 14px; height: 14px; }

  /* STAGE */
  .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; display: flex; align-items: center; justify-content: center; }
  .stage iframe { width: 100%; height: 100%; border: 0; background: var(--plum-deep); display: block; }

  /* BOTTOM NAV */
  .navbar {
    flex-shrink: 0; display: flex; align-items: stretch; gap: 8px;
    padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: rgba(10, 5, 10, 0.92); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255, 215, 0, 0.15);
    position: relative; z-index: 20;
  }
  .nav-arrow { width: 52px; border-radius: 12px; background: rgba(255, 249, 240, 0.06); border: 1px solid rgba(255, 249, 240, 0.15); color: var(--cream); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .nav-arrow:active { background: rgba(255, 249, 240, 0.12); transform: scale(0.97); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .nav-arrow svg { width: 14px; height: 14px; }
  .nav-next { flex: 1; padding: 12px 16px; border-radius: 12px; background: linear-gradient(180deg, var(--hot-pink) 0%, var(--pink-deep) 100%); border: 1.5px solid var(--black); box-shadow: 0 3px 0 var(--black), 0 0 18px rgba(233, 30, 99, 0.45); color: var(--cream); font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 15px; letter-spacing: -0.2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.08s; }
  .nav-next:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--black), 0 0 18px rgba(233, 30, 99, 0.45); }
  .nav-next .ep-tag { font-family: 'Inter', system-ui; font-style: normal; font-size: 8px; font-weight: 900; letter-spacing: 0.22em; color: var(--gold); padding: 3px 6px; background: rgba(0,0,0,0.4); border-radius: 3px; }
  .nav-next.finale { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%); color: var(--black); box-shadow: 0 3px 0 var(--black), 0 0 18px rgba(255, 215, 0, 0.45); }
  .nav-next.finale .ep-tag { background: rgba(0,0,0,0.2); color: var(--pink-deep); }

  /* PROGRESS STRIP */
  .progress { flex-shrink: 0; display: flex; gap: 3px; padding: 6px 14px 0; background: rgba(10, 5, 10, 0.92); }
  .progress-tick { flex: 1; height: 3px; border-radius: 2px; background: rgba(255, 249, 240, 0.1); transition: background 0.2s; }
  .progress-tick.done { background: var(--gold); box-shadow: 0 0 4px var(--gold); }
  .progress-tick.current { background: var(--hot-pink); box-shadow: 0 0 6px var(--hot-pink); }

  /* MENU OVERLAY */
  .menu-overlay { position: fixed; inset: 0; background: rgba(5, 3, 8, 0.88); backdrop-filter: blur(16px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; overflow-y: auto; }
  .menu-overlay.open { opacity: 1; pointer-events: auto; }
  .menu-inner { padding: 20px 16px 32px; padding-top: max(20px, env(safe-area-inset-top)); }
  .menu-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  .menu-title-wrap > div:first-child { font-family: 'Inter', system-ui; font-size: 9px; font-weight: 900; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 2px; }
  .menu-title-wrap > div:last-child { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 28px; color: var(--cream); line-height: 1; letter-spacing: -0.6px; text-shadow: 0 0 16px rgba(233, 30, 99, 0.5); }
  .menu-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 249, 240, 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--cream); flex-shrink: 0; }
  .menu-list { display: flex; flex-direction: column; gap: 6px; }
  .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; background: rgba(255, 249, 240, 0.04); border: 1px solid rgba(255, 249, 240, 0.08); cursor: pointer; transition: all 0.15s; text-align: left; color: var(--cream); font-family: inherit; width: 100%; }
  .menu-item:active { background: rgba(233, 30, 99, 0.12); }
  .menu-item.current { background: rgba(233, 30, 99, 0.15); border-color: var(--hot-pink); box-shadow: 0 0 16px rgba(233, 30, 99, 0.25); }
  .menu-item.done { opacity: 0.72; }
  .menu-num { width: 32px; flex-shrink: 0; text-align: center; }
  .menu-num-label { font-family: 'Inter', system-ui; font-size: 7px; font-weight: 900; letter-spacing: 0.18em; color: rgba(255, 249, 240, 0.45); }
  .menu-num-digit { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 18px; line-height: 1; color: var(--cream); }
  .menu-item.current .menu-num-digit { color: var(--hot-pink); text-shadow: 0 0 8px var(--hot-pink); }
  .menu-item.done .menu-num-digit { color: var(--gold); }
  .menu-info { flex: 1; min-width: 0; }
  .menu-item-title { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 15px; color: var(--cream); line-height: 1.15; }
  .menu-item-sub { font-family: 'Inter', system-ui; font-size: 10px; font-weight: 500; color: rgba(255, 249, 240, 0.5); margin-top: 2px; }
  .menu-item-badge { font-family: 'Inter', system-ui; font-size: 7px; font-weight: 900; letter-spacing: 0.22em; color: var(--black); background: var(--gold); padding: 3px 6px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0; }
  .menu-item.current .menu-item-badge { background: var(--hot-pink); color: var(--cream); }
  .menu-reset { margin-top: 16px; padding: 10px; width: 100%; background: transparent; border: 1px dashed rgba(255, 215, 0, 0.35); border-radius: 10px; color: var(--gold); font-family: 'Inter', system-ui; font-size: 10px; font-weight: 800; letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase; }
  .menu-reset:active { background: rgba(255, 215, 0, 0.08); }

  @media (max-width: 400px) {
    .logo-sub { display: none; }
    .nav-next { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-main">Pump Rules</div>
    <div class="logo-sub">· Real Estate Reunion</div>
  </div>
  <div class="ep-counter" id="epCounter">EP 01 / 13</div>
  <button class="menu-btn" id="menuBtn" aria-label="Episode menu">
    <svg viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
</div>

<div class="progress" id="progress"></div>

<div class="stage">
  <iframe id="stage" title="Pump Rules screen"></iframe>
</div>

<div class="navbar">
  <button class="nav-arrow" id="prevBtn" aria-label="Previous episode">
    <svg viewBox="0 0 14 14" fill="none"><path d="M9 1L3 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="nav-next" id="nextBtn">
    <span id="nextLabel">Roll the tape</span>
    <span class="ep-tag" id="nextTag">EP 02</span>
  </button>
  <button class="nav-arrow" id="forwardBtn" aria-label="Skip forward">
    <svg viewBox="0 0 14 14" fill="none"><path d="M5 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-inner">
    <div class="menu-head">
      <div class="menu-title-wrap">
        <div>Season 1 · 13 Episodes</div>
        <div>The Episode Guide</div>
      </div>
      <button class="menu-close" id="menuClose" aria-label="Close menu">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="menu-list" id="menuList"></div>
    <button class="menu-reset" id="resetBtn">Start over from Ep 01</button>
  </div>
</div>

<script>
const EPISODES = [
  { file: 'Casting Call.html',    title: 'Casting Call',    sub: 'Audition for your own season',           cta: 'Start the audition' },
  { file: 'Home Screen.html',     title: 'Now Showing',     sub: 'Tonight\u2019s episode drops',            cta: 'Roll the tape' },
  { file: 'Act Map.html',         title: 'The Act Map',     sub: 'Chart the whole season',                 cta: 'Open the map' },
  { file: 'The Player.html',      title: 'The Player',      sub: 'Tonight\u2019s scene in session',         cta: 'Play the scene' },
  { file: 'Mazel Reveal.html',    title: 'Mazel',           sub: 'Andy drops the good bomb',               cta: 'Take a bow' },
  { file: 'Jackhole Reveal.html', title: 'Jackhole',        sub: 'Andy drops the bad bomb',                cta: 'Face it' },
  { file: 'Act Recap.html',       title: 'That\u2019s a Wrap',    sub: 'The episode recap',                      cta: 'Read the recap' },
  { file: 'The Reunion.html',     title: 'The Reunion',     sub: 'Domain-wide scorecard',                  cta: 'Take your seat' },
  { file: 'Rawt in Hail.html',    title: 'Rawt in Hail',    sub: 'Streak-3 thunderclap',                   cta: 'Feel the lightning' },
  { file: 'Streak Break.html',    title: 'Streak Break',    sub: 'And\u2026 cut. Lisa\u2019s got a save.', cta: 'Face the break' },
  { file: 'After Show.html',      title: 'After Show',      sub: 'Lisa in your DMs',                       cta: 'Text Lisa' },
  { file: 'Spoiler Alert.html',   title: 'Spoiler Alert',   sub: 'The 21-day runway',                      cta: 'Peek at the plan' },
  { file: 'Series Finale.html',   title: 'Series Finale',   sub: 'You passed. Go sell a house.',           cta: 'Take the crown', finale: true },
];

const STORAGE_KEY = 'pumpRules.currentEp';
const SEEN_KEY = 'pumpRules.seenEps';

const stage = document.getElementById('stage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const forwardBtn = document.getElementById('forwardBtn');
const nextLabel = document.getElementById('nextLabel');
const nextTag = document.getElementById('nextTag');
const epCounter = document.getElementById('epCounter');
const progress = document.getElementById('progress');
const menuBtn = document.getElementById('menuBtn');
const menuClose = document.getElementById('menuClose');
const menuOverlay = document.getElementById('menuOverlay');
const menuList = document.getElementById('menuList');
const resetBtn = document.getElementById('resetBtn');

function readSeen() {
  try { return new Set(JSON.parse(localStorage.getItem(SEEN_KEY) || '[]')); }
  catch { return new Set(); }
}
function writeSeen(set) { localStorage.setItem(SEEN_KEY, JSON.stringify([...set])); }

let current = Math.max(0, Math.min(EPISODES.length - 1, parseInt(localStorage.getItem(STORAGE_KEY), 10) || 0));
let seen = readSeen();

function pad(n) { return String(n).padStart(2, '0'); }

function renderProgress() {
  progress.innerHTML = '';
  EPISODES.forEach((_, i) => {
    const tick = document.createElement('div');
    tick.className = 'progress-tick' + (i === current ? ' current' : (seen.has(i) || i < current ? ' done' : ''));
    progress.appendChild(tick);
  });
}

function renderMenu() {
  menuList.innerHTML = '';
  EPISODES.forEach((ep, i) => {
    const btn = document.createElement('button');
    const isDone = seen.has(i) && i !== current;
    btn.className = 'menu-item' + (i === current ? ' current' : (isDone ? ' done' : ''));
    btn.innerHTML = `
      <div class="menu-num">
        <div class="menu-num-label">EP</div>
        <div class="menu-num-digit">${pad(i + 1)}</div>
      </div>
      <div class="menu-info">
        <div class="menu-item-title">${ep.title}</div>
        <div class="menu-item-sub">${ep.sub}</div>
      </div>
      ${i === current ? '<div class="menu-item-badge">Now</div>' : (isDone ? '<div class="menu-item-badge" style="background:#A8820E;color:#FFF9F0">Seen</div>' : '')}
    `;
    btn.addEventListener('click', () => { goTo(i); closeMenu(); });
    menuList.appendChild(btn);
  });
}

function updateNav() {
  const ep = EPISODES[current];
  const next = EPISODES[current + 1];
  epCounter.textContent = `EP ${pad(current + 1)} / ${pad(EPISODES.length)}`;
  prevBtn.disabled = current === 0;
  forwardBtn.disabled = current === EPISODES.length - 1;
  if (next) {
    nextLabel.textContent = next.cta;
    nextTag.textContent = `EP ${pad(current + 2)}`;
    nextBtn.classList.toggle('finale', !!next.finale);
    nextBtn.disabled = false;
  } else {
    nextLabel.textContent = 'Start again';
    nextTag.textContent = '\u21BB';
    nextBtn.classList.remove('finale');
    nextBtn.disabled = false;
  }
}

function goTo(i) {
  current = Math.max(0, Math.min(EPISODES.length - 1, i));
  localStorage.setItem(STORAGE_KEY, String(current));
  seen.add(current);
  writeSeen(seen);
  stage.src = EPISODES[current].file;
  renderProgress();
  renderMenu();
  updateNav();
}

function openMenu() { renderMenu(); menuOverlay.classList.add('open'); }
function closeMenu() { menuOverlay.classList.remove('open'); }

prevBtn.addEventListener('click', () => goTo(current - 1));
forwardBtn.addEventListener('click', () => goTo(current + 1));
nextBtn.addEventListener('click', () => {
  if (current === EPISODES.length - 1) goTo(0);
  else goTo(current + 1);
});
menuBtn.addEventListener('click', openMenu);
menuClose.addEventListener('click', closeMenu);
menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenu(); });
resetBtn.addEventListener('click', () => {
  seen = new Set();
  writeSeen(seen);
  goTo(0);
  closeMenu();
});

document.addEventListener('keydown', (e) => {
  if (menuOverlay.classList.contains('open')) {
    if (e.key === 'Escape') closeMenu();
    return;
  }
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === 'ArrowLeft') goTo(current - 1);
});

// initial
stage.src = EPISODES[current].file;
seen.add(current);
writeSeen(seen);
renderProgress();
renderMenu();
updateNav();
</script>

</body>
</html>
